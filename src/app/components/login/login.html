<div class="login-container">
  <h2>Login</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="username">Username (Email):</label>
      <input type="email" id="username" formControlName="username" class="form-control">
      <div *ngIf="username?.invalid && username?.touched" class="error">
        <span *ngIf="username?.errors?.['required']">Username is required</span>
        <span *ngIf="username?.errors?.['email']">Invalid email format</span>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password:</label>
      <input type="password" id="password" formControlName="password" class="form-control">
      <div *ngIf="password?.invalid && password?.touched" class="error">
        <span *ngIf="password?.errors?.['required']">Password is required</span>
      </div>
    </div>

    <div class="form-group">
      <label for="captcha">Verification Code:</label>
      <div class="captcha-box">
        <div class="captcha-code">{{ captchaCode }}</div>
        <button type="button" class="btn-refresh" (click)="generateCaptcha()" title="Refresh">🔄</button>
      </div>
      <input type="text" id="captcha" formControlName="recaptcha" placeholder="Enter the code above" class="form-control">
      <div *ngIf="recaptcha?.invalid && recaptcha?.touched" class="error">
        <span *ngIf="recaptcha?.errors?.['required']">Verification code is required</span>
        <span *ngIf="recaptcha?.errors?.['pattern']">Verification code does not match</span>
      </div>
    </div>

    <div class="form-links">
      <a href="javascript:void(0)" (click)="navigateToRegister()" class="link">Register</a>
      <a href="javascript:void(0)" (click)="navigateToForgotPassword()" class="link">Forgot Password?</a>
    </div>

    <button type="submit" [disabled]="loginForm.invalid" class="btn btn-primary">Login</button>
  </form>
</div>

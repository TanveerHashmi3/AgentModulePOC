<div class="reset-password-container">
  <h2>Reset Your Password</h2>
  <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="newPassword">New Password</label>
      <input
        type="password"
        id="newPassword"
        formControlName="newPassword"
        [ngClass]="{ 'is-invalid': submitted && newPassword?.invalid }"
      />
      <div *ngIf="submitted && newPassword?.errors?.['required']" class="invalid-feedback">
        <div>Password is required.</div>
      </div>
      <div *ngIf="submitted && newPassword?.errors?.['minlength']" class="invalid-feedback">
        <div>Password must be at least 6 characters.</div>
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input
        type="password"
        id="confirmPassword"
        formControlName="confirmPassword"
        [ngClass]="{ 'is-invalid': submitted && confirmPassword?.invalid }"
      />
      <div *ngIf="submitted && confirmPassword?.errors?.['required']" class="invalid-feedback">
        <div>Confirmation is required.</div>
      </div>
      <div *ngIf="submitted && resetPasswordForm.errors?.['mismatch']" class="invalid-feedback">
        <div>Passwords do not match.</div>
      </div>
    </div>

    <button type="submit" class="btn btn-primary">Reset Password</button>
    <button type="button" class="btn btn-secondary" (click)="goBackToLogin()">Cancel</button>
  </form>

  <div *ngIf="successMessage" class="success-message">
    {{ successMessage }}
  </div>
</div>

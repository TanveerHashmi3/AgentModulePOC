<div class="forgot-password-container">
  <h2>Forgot Password</h2>
  
  <div *ngIf="successMessage" class="success-message">
    {{ successMessage }}
  </div>

  <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" *ngIf="!successMessage">
    <p class="info-text">Enter your email address and we'll send you a link to reset your password.</p>
    
    <div class="form-group">
      <label for="email">Email Address:</label>
      <input type="email" id="email" formControlName="email" class="form-control" placeholder="Enter your email">
      <div *ngIf="email?.invalid && (email?.touched || submitted)" class="error">
        <span *ngIf="email?.errors?.['required']">Email is required</span>
        <span *ngIf="email?.errors?.['email']">Invalid email format</span>
      </div>
    </div>

    <button type="submit" [disabled]="forgotPasswordForm.invalid" class="btn btn-primary">Send Reset Link</button>
  </form>

  <div class="form-links">
    <a href="javascript:void(0)" (click)="goBackToLogin()" class="link">Back to Login</a>
  </div>
</div>
